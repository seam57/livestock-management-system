<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>নিবন্ধন করুন | DairyFarm</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --primary-green: #2d5a27;
            --accent-green: #38ef7d;
            --glass-bg: rgba(255, 255, 255, 0.12);
        }

        body, html {
            height: 100%;
            margin: 0;
            font-family: 'Hind Siliguri', sans-serif;
            background-image: linear-gradient(rgba(0, 0, 0, 0.5), rgba(0, 0, 0, 0.5)), 
                              url('https://images.unsplash.com/photo-1500595046743-cd271d694d30?q=80&w=2070&auto=format&fit=crop'); 
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* রেজিস্ট্রেশন কার্ড */
        .register-card {
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 25px;
            padding: 40px;
            color: white;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            width: 100%;
            max-width: 480px;
        }

        /* ইনপুট ফিল্ড স্টাইল */
        .register-card input:not([type="radio"]) {
            width: 100% !important;
            background: rgba(255, 255, 255, 0.95) !important;
            border-radius: 12px !important;
            padding: 10px 15px !important;
            border: none !important;
            margin-top: 5px;
            color: #333 !important;
        }

        /* রোল বক্স (Farmer/Doctor) */
        .role-section {
            background: rgba(255, 255, 255, 0.1);
            border: 1px dashed rgba(255, 255, 255, 0.4);
            border-radius: 15px;
            padding: 15px;
            margin: 20px 0;
        }

        .form-check-input:checked {
            background-color: var(--accent-green);
            border-color: var(--accent-green);
        }

        /* বাটন */
        .btn-register {
            background: var(--primary-green);
            color: white;
            width: 100%;
            padding: 12px;
            border-radius: 12px;
            font-weight: 700;
            border: none;
            transition: 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-register:hover {
            background: #1e3d1a;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        .login-link {
            color: var(--accent-green);
            text-decoration: none;
            font-weight: 700;
        }

        .login-link:hover {
            text-decoration: underline;
        }

        .form-label {
            font-size: 0.9rem;
            font-weight: 600;
            margin-bottom: 2px;
            color: rgba(255,255,255,0.9);
        }

        /* জ্যাঙ্গো এরর মেসেজ */
        .text-danger {
            font-size: 0.8rem;
            color: #ff8a8a !important;
        }
    </style>
</head>
<body>

<div class="register-card">
    <div class="text-center mb-4">
        <h2 class="fw-bold m-0"><i class="fas fa-cow me-2" style="color: var(--accent-green);"></i>DairyFarm</h2>
        <p class="text-white-50 small mt-1">নতুন অ্যাকাউন্ট তৈরি করুন</p>
    </div>

    <form method="POST">
        {% csrf_token %}
        
        {% for field in form %}
        <div class="mb-3">
            <label class="form-label">{{ field.label }}</label>
            {{ field }}
            {% if field.errors %}
                {% for error in field.errors %}
                    <div class="text-danger mt-1"><i class="fas fa-exclamation-circle me-1"></i>{{ error }}</div>
                {% endfor %}
            {% endif %}
        </div>
        {% endfor %}

        <div class="role-section">
            <label class="form-label d-block mb-2 text-center">আমি একজন:</label>
            <div class="d-flex justify-content-around">
                <div class="form-check">
                    <input class="form-check-input" type="radio" name="role" id="farmer" value="farmer" checked>
                    <label class="form-check-label text-white" for="farmer">খামারি (Farmer)</label>
                </div>
                <div class="form-check">
                    <input class="form-check-input" type="radio" name="role" id="doctor" value="doctor">
                    <label class="form-check-label text-white" for="doctor">ডাক্তার (Doctor)</label>
                </div>
            </div>
        </div>

        <button type="submit" class="btn btn-register shadow">অ্যাকাউন্ট তৈরি করুন</button>
    </form>
    
    <div class="text-center mt-4">
        <p class="mb-0" style="color: rgba(255,255,255,0.7);">
            আগে থেকেই অ্যাকাউন্ট আছে? 
            <a href="{% url 'login' %}" class="login-link">লগইন করুন</a>
        </p>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Livestock Management System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .card-icon { font-size: 2.5rem; margin-bottom: 10px; }
        .hero-section { background-color: #f8f9fa; padding: 40px 0; border-bottom: 2px solid #ddd; }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-success">
        <div class="container">
            <a class="navbar-brand" href="#">Smart Livestock</a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link active" href="#">Dashboard</a>
                <a class="nav-link" href="#">Add Animal</a>
                <a class="nav-link" href="#">Reports</a>
            </div>
        </div>
    </nav>

    <div class="hero-section text-center">
        <div class="container">
            <h1>Welcome to Smart Farm Manager</h1>
            <p>Manage your Cows, Hens, and Goats efficiently.</p>
            
            </div>
    </div>

    <div class="container my-5">
        <div class="row text-center">
            
            <div class="col-md-4 mb-4">
                <div class="card shadow-sm h-100 p-3">
                    <div class="card-body">
                        <h4 class="card-title text-primary">Cow Management</h4>
                        <p>Total Cows: 12</p>
                        <a href="#" class="btn btn-outline-primary btn-sm">View Details</a>
                    </div>
                </div>
            </div>

            <div class="col-md-4 mb-4">
                <div class="card shadow-sm h-100 p-3">
                    <div class="card-body">
                        <h4 class="card-title text-danger">Hen Management</h4>
                        <p>Total Hens: 150</p>
                        <a href="#" class="btn btn-outline-danger btn-sm">View Details</a>
                    </div>
                </div>
            </div>

            <div class="col-md-4 mb-4">
                <div class="card shadow-sm h-100 p-3">
                    <div class="card-body">
                        <h4 class="card-title text-success">Goat Management</h4>
                        <p>Total Goats: 25</p>
                        <a href="#" class="btn btn-outline-success btn-sm">View Details</a>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
